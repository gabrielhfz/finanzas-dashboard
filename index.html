<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finanzas Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body{margin:0;background:#0f172a;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;}
    *{box-sizing:border-box;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:#1e293b;}
    ::-webkit-scrollbar-thumb{background:#475569;border-radius:3px;}
    select option{background:#1e293b;color:#f1f5f9;}
    select{cursor:pointer;}
    .tbl-row:hover{background:rgba(255,255,255,0.04);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=window.React.useState,useEffect=window.React.useEffect,useMemo=window.React.useMemo,useCallback=window.React.useCallback;
var R=window.Recharts;
var BarChart=R.BarChart,Bar=R.Bar,Cell=R.Cell;
var XAxis=R.XAxis,YAxis=R.YAxis,CartesianGrid=R.CartesianGrid;
var Tooltip=R.Tooltip,ResponsiveContainer=R.ResponsiveContainer;
var ComposedChart=R.ComposedChart,Line=R.Line,Legend=R.Legend,ReferenceLine=R.ReferenceLine;

/* CONFIG */
var PROXY_URL="https://script.google.com/macros/s/AKfycbxht2lI3b0v7RX5eEpTNm6Khn8thsAFmjbvSmk3HsBCzkWnQfqGky-2l31oyMTPHmIl/exec";

/* COLORES */
var C={
  ing:"#10b981",eg:"#ef4444",ah:"#3b82f6",ac:"#f59e0b",
  bg:"#0f172a",card:"#1e293b",br:"#334155",tx:"#f1f5f9",sub:"#94a3b8",
  up:"#10b981",dn:"#ef4444",neu:"#94a3b8"
};

/* Utilidades */
function fmt(n){return n.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtUSD(n){return "$"+fmt(Math.round(n))}
function getMonthName(m){var months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];return months[m]}
function getLastDay(y,m){return new Date(y,m+1,0).getDate()}

function App(){
  var [data,setData]=useState([]);
  var [months,setMonths]=useState([]);
  var [selectedMonths,setSelectedMonths]=useState([]);
  var [isAccum,setIsAccum]=useState(true);
  var [loading,setLoading]=useState(false);
  var [error,setError]=useState("");

  useEffect(function(){
    setLoading(true);
    setError("");
    fetch(PROXY_URL)
      .then(function(r){return r.json()})
      .then(function(d){
        if(d.error){setError(d.error);return}
        setData(d.data||[]);
        var mset=new Set();
        (d.data||[]).forEach(function(row){mset.add(row.mes)});
        var sorted=Array.from(mset).sort();
        setMonths(sorted);
        if(sorted.length>0){setSelectedMonths([sorted[sorted.length-1]])}
      })
      .catch(function(e){setError("Error: "+e.message)})
      .finally(function(){setLoading(false)})
  },[]);

  var filtered=useMemo(function(){
    return data.filter(function(row){
      return selectedMonths.includes(row.mes);
    });
  },[data,selectedMonths]);

  var metrics=useMemo(function(){
    var ing=0,eg=0,saldo=0;
    filtered.forEach(function(r){
      ing+=r.ingresos||0;
      eg+=r.egresos||0;
    });
    saldo=ing-eg;
    return {ing:ing,eg:eg,saldo:saldo};
  },[filtered]);

  var porConcepto=useMemo(function(){
    var map={};
    filtered.forEach(function(r){
      if(!map[r.concepto]){map[r.concepto]={concepto:r.concepto,ing:0,eg:0}}
      map[r.concepto].ing+=r.ingresos||0;
      map[r.concepto].eg+=r.egresos||0;
    });
    return Object.values(map);
  },[filtered]);

  var handleMonthToggle=useCallback(function(m){
    setSelectedMonths(function(prev){
      if(prev.includes(m)){return prev.filter(function(x){return x!==m})}
      return [].concat(prev,[m]).sort()
    })
  },[]);

  return React.createElement("div",{className:"w-screen h-screen bg-slate-950 text-slate-100 flex flex-col p-4"},
    React.createElement("div",{className:"flex justify-between items-center mb-4"},
      React.createElement("h1",{className:"text-2xl font-bold"},"Finanzas Dashboard"),
      React.createElement("div",{className:"flex gap-2"},
        React.createElement("button",{
          onClick:function(){setIsAccum(!isAccum)},
          className:"px-3 py-1 rounded "+(isAccum?"bg-blue-600":"bg-slate-700")+" text-sm"
        },isAccum?"Acumulado":"Promedio")
      )
    ),
    
    React.createElement("div",{className:"mb-4 p-3 bg-slate-800 rounded"},
      React.createElement("label",{className:"block text-sm font-semibold mb-2"},"Seleccionar meses:"),
      React.createElement("div",{className:"flex flex-wrap gap-2"},
        months.map(function(m){
          return React.createElement("button",{
            key:m,
            onClick:function(){handleMonthToggle(m)},
            className:"px-3 py-1 rounded text-sm "+(selectedMonths.includes(m)?"bg-amber-500 text-black":"bg-slate-600 text-slate-100")
          },m)
        })
      )
    ),

    React.createElement("div",{className:"grid grid-cols-3 gap-3 mb-4"},
      React.createElement("div",{className:"bg-slate-800 p-4 rounded"},
        React.createElement("div",{className:"text-xs text-slate-400 mb-1"},"Ingresos"),
        React.createElement("div",{className:"text-xl font-bold text-green-500"},fmtUSD(metrics.ing))
      ),
      React.createElement("div",{className:"bg-slate-800 p-4 rounded"},
        React.createElement("div",{className:"text-xs text-slate-400 mb-1"},"Egresos"),
        React.createElement("div",{className:"text-xl font-bold text-red-500"},fmtUSD(metrics.eg))
      ),
      React.createElement("div",{className:"bg-slate-800 p-4 rounded"},
        React.createElement("div",{className:"text-xs text-slate-400 mb-1"},"Saldo"),
        React.createElement("div",{className:"text-xl font-bold "+(metrics.saldo>=0?"text-green-500":"text-red-500")},fmtUSD(metrics.saldo))
      )
    ),

    React.createElement("div",{className:"grid grid-cols-2 gap-4 flex-1 min-h-0 overflow-hidden"},
      React.createElement("div",{className:"bg-slate-800 p-4 rounded flex flex-col"},
        React.createElement("h3",{className:"font-semibold mb-2"},"Conceptos"),
        React.createElement("div",{className:"flex-1 overflow-y-auto"},
          React.createElement("table",{className:"w-full text-sm"},
            React.createElement("thead",null,
              React.createElement("tr",{className:"border-b border-slate-600"},
                React.createElement("th",{className:"text-left py-1"},"Concepto"),
                React.createElement("th",{className:"text-right py-1"},"Ingreso"),
                React.createElement("th",{className:"text-right py-1"},"Egreso")
              )
            ),
            React.createElement("tbody",null,
              porConcepto.map(function(item){
                return React.createElement("tr",{key:item.concepto,className:"border-b border-slate-700 tbl-row"},
                  React.createElement("td",{className:"py-2"},item.concepto),
                  React.createElement("td",{className:"text-right text-green-400"},item.ing>0?fmtUSD(item.ing):""),
                  React.createElement("td",{className:"text-right text-red-400"},item.eg>0?fmtUSD(item.eg):"")
                )
              })
            )
          )
        )
      ),

      React.createElement("div",{className:"bg-slate-800 p-4 rounded flex flex-col"},
        React.createElement("h3",{className:"font-semibold mb-2"},"Gráfico por Concepto"),
        React.createElement("div",{className:"flex-1"},
          React.createElement(ResponsiveContainer,{width:"100%",height:"100%"},
            React.createElement(BarChart,{data:porConcepto},
              React.createElement(CartesianGrid,{strokeDasharray:"3 3",stroke:"#475569"}),
              React.createElement(XAxis,{dataKey:"concepto",stroke:"#94a3b8",tick:{fontSize:12}}),
              React.createElement(YAxis,{stroke:"#94a3b8",tick:{fontSize:12}}),
              React.createElement(Tooltip,{contentStyle:{background:"#1e293b",border:"1px solid #475569"}}),
              React.createElement(Bar,{dataKey:"ing",fill:"#10b981",name:"Ingreso"}),
              React.createElement(Bar,{dataKey:"eg",fill:"#ef4444",name:"Egreso"})
            )
          )
        )
      )
    ),

    loading&&React.createElement("div",{className:"fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center"},
      React.createElement("div",{className:"bg-slate-800 p-6 rounded"},"Cargando...")
    ),
    error&&React.createElement("div",{className:"fixed inset-0 bg-red-900 bg-opacity-50 flex items-center justify-center"},
      React.createElement("div",{className:"bg-slate-800 p-6 rounded text-red-300"},"Error: "+error)
    )
  );
}

window.ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
