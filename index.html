<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finanzas Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body{margin:0;background:#0f172a;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;}
    @media(max-width:699px){body{overflow:auto;}}
    *{box-sizing:border-box;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:#1e293b;}
    ::-webkit-scrollbar-thumb{background:#475569;border-radius:3px;}
    select option{background:#1e293b;color:#f1f5f9;}
    select{cursor:pointer;}
    .tbl-row:hover{background:rgba(255,255,255,0.04);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=window.React.useState,useEffect=window.React.useEffect,useMemo=window.React.useMemo,useCallback=window.React.useCallback;
var R=window.Recharts;
var BarChart=R.BarChart,Bar=R.Bar,Cell=R.Cell;
var XAxis=R.XAxis,YAxis=R.YAxis,CartesianGrid=R.CartesianGrid;
var Tooltip=R.Tooltip,ResponsiveContainer=R.ResponsiveContainer;
var ComposedChart=R.ComposedChart,Line=R.Line,Legend=R.Legend,ReferenceLine=R.ReferenceLine;

/* HOOK MOBILE */
function useIsMobile(){
  var [mob,setMob]=useState(window.innerWidth<700);
  useEffect(function(){
    function onResize(){setMob(window.innerWidth<700);}
    window.addEventListener("resize",onResize);
    return function(){window.removeEventListener("resize",onResize);};
  },[]);
  return mob;
}

/* CONFIG */
var config={
  spreadsheetId:"1F7w61RgBCvGZpPd3i6FWZKCHvq3uYf9L6dY3kJ2vXxI",
  monthlySheet:"Movimientos",
  yearsUrl:"https://script.google.com/macros/d/1_H8Pg8mVCHqDrYNVpLx6NfXjhpDEp1q-7gI_AkLfS4U/usercache",
  balanceUrl:"https://script.google.com/macros/d/1bA8PKDUEsM06B0RVKcdKFr6pQfDvZwDDKl-y-iRhYQs/usercache",
  accountCurrencies:{
    "Caja":"USD",
    "Inversiones":"USD",
    "Tarjeta":"UYU",
    "Banco":"UYU"
  }
};

/* HELPERS FETCH Y PARSE */
function requestCORS(url,cb){
  if(url.indexOf("script.google.com")!==-1){
    fetch(url).then(r=>r.text()).then(txt=>{
      try{var d=JSON.parse(txt);cb(null,d);}
      catch(e){console.log("Parse error",e);cb(e);}
    }).catch(err=>cb(err));
  }else{
    fetch(url).then(r=>r.json()).then(d=>cb(null,d)).catch(err=>cb(err));
  }
}

function fetchSheetData(sheetId,sheetName,cb){
  var url="https://docs.google.com/spreadsheets/d/"+sheetId+"/export?format=csv&gid=0&range="+sheetName;
  if(sheetName.indexOf("!")!==-1){
    var parts=sheetName.split("!");
    var sheet=parts[0];
    var range=parts[1];
    url="https://docs.google.com/spreadsheets/d/"+sheetId+"/export?format=csv&gid=0&range="+sheet+"!"+range;
  }
  fetch(url).then(r=>r.text()).then(csv=>{
    var lines=csv.split("\n");
    var headers=lines[0].split(",").map(h=>h.trim());
    var data=[];
    for(var i=1;i<lines.length;i++){
      if(lines[i].trim()==="")continue;
      var values=lines[i].split(",");
      var row={};
      for(var j=0;j<headers.length;j++){
        row[headers[j]]=values[j]?values[j].trim():"";
      }
      data.push(row);
    }
    cb(null,data);
  }).catch(err=>cb(err));
}

function getLastRowData(sheetId,sheetName,cb){
  var url="https://script.google.com/macros/d/1bA8PKDUEsM06B0RVKcdKFr6pQfDvZwDDKl-y-iRhYQs/usercache";
  fetch(url).then(r=>r.json()).then(d=>{
    if(d&&d[sheetName]){
      var lastRow=d[sheetName];
      cb(null,lastRow);
    }else{
      cb(null,{});
    }
  }).catch(err=>{
    console.log("Error fetching balance",err);
    cb(null,{});
  });
}

/* COMPONENTES */
function Loader(){
  return React.createElement("div",{className:"flex items-center justify-center h-screen bg-slate-900"},
    React.createElement("div",{className:"text-white text-xl"},"Cargando...")
  );
}

function KPI({title,value,currency,isLoading}){
  return React.createElement("div",{className:"bg-slate-800 rounded p-4 text-center min-w-0"},
    React.createElement("div",{className:"text-slate-400 text-sm font-medium mb-2"},title),
    React.createElement("div",{className:"text-2xl font-bold text-white"},
      isLoading?"...":value+" "+currency
    )
  );
}

function ChartComponent({title,data,type}){
  if(type==="bar"){
    return React.createElement("div",{className:"bg-slate-800 rounded p-4 w-full"},
      React.createElement("h3",{className:"text-white font-bold mb-4"},title),
      React.createElement(ResponsiveContainer,{width:"100%",height:300},
        React.createElement(BarChart,{data:data},
          React.createElement(CartesianGrid,{strokeDasharray:"3 3",stroke:"#475569"}),
          React.createElement(XAxis,{dataKey:"name",stroke:"#94a3b8"}),
          React.createElement(YAxis,{stroke:"#94a3b8"}),
          React.createElement(Tooltip,{contentStyle:{backgroundColor:"#1e293b",border:"1px solid #475569"}}),
          React.createElement(Bar,{dataKey:"value",fill:"#3b82f6"})
        )
      )
    );
  }
  return React.createElement("div",{className:"bg-slate-800 rounded p-4 w-full"},
    React.createElement("h3",{className:"text-white font-bold mb-4"},title),
    React.createElement("p",{className:"text-slate-300"},"Tipo de gráfico no soportado")
  );
}

function MobileLayout({isMobile,children}){
  if(!isMobile)return children;
  return React.createElement("div",{className:"w-full"},children);
}

function App(){
  var [data,setData]=useState(null);
  var [loading,setLoading]=useState(true);
  var [error,setError]=useState(null);
  var [selectedYear,setSelectedYear]=useState(new Date().getFullYear()+"");
  var isMobile=useIsMobile();

  useEffect(function(){
    // Simulamos carga de datos
    var mockData={
      kpis:{
        totalIncome:"150,000",
        totalExpense:"45,000",
        balance:"105,000"
      },
      chartData:[
        {name:"Ene",value:12000},
        {name:"Feb",value:15000},
        {name:"Mar",value:14000}
      ]
    };
    
    setTimeout(function(){
      setData(mockData);
      setLoading(false);
    },1000);
  },[]);

  if(error){
    return React.createElement("div",{className:"flex items-center justify-center h-screen bg-slate-900 text-red-500"},
      "Error: "+error
    );
  }

  if(loading||!data){
    return React.createElement(Loader,null);
  }

  return React.createElement("div",{className:"bg-slate-900 min-h-screen p-4"},
    React.createElement("h1",{className:"text-3xl font-bold text-white mb-6"},"Finanzas Dashboard"),
    React.createElement("div",{className:isMobile?"grid grid-cols-2 gap-2 mb-6":"grid grid-cols-3 gap-4 mb-6"},
      React.createElement(KPI,{title:"Ingresos",value:data.kpis.totalIncome,currency:"USD"}),
      React.createElement(KPI,{title:"Gastos",value:data.kpis.totalExpense,currency:"USD"}),
      React.createElement(KPI,{title:"Balance",value:data.kpis.balance,currency:"USD"})
    ),
    React.createElement(ChartComponent,{title:"Ingresos mensuales",data:data.chartData,type:"bar"})
  );
}

window.ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
